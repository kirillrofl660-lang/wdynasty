# Production: пулл образа из GitHub Container Registry
# Перед запуском: заполни .env, замени IMAGE на свой ghcr.io
# docker compose -f docker-compose.prod.yml up -d
version: '3.8'

services:
  web:
    image: ${GHCR_IMAGE:-ghcr.io/YOUR_USERNAME/wdynasty:latest}
    container_name: wdynasty-prod
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./data/local.db:/app/data/local.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
